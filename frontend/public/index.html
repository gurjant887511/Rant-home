<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#667eea" />
    <meta name="description" content="RentHub - Find your perfect rental property. Share rants and reviews about rentals in your neighborhood." />
    <meta name="keywords" content="rentals, rent, apartment, house, property, rant, reviews, rental listings" />
    <meta name="author" content="RentHub" />
    <link rel="canonical" href="https://www.example.com/" />
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="RentHub — Rental listings & rants" />
    <meta property="og:description" content="Find rental properties and share candid rants and reviews with the community." />
    <meta property="og:url" content="https://www.example.com/" />
    <meta property="og:site_name" content="RentHub" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1505691723518-36a6bd5b4a84?auto=format&fit=crop&w=1950&q=80" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RentHub — Rental listings & rants" />
    <meta name="twitter:description" content="Find rental properties and share candid rants and reviews with the community." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1505691723518-36a6bd5b4a84?auto=format&fit=crop&w=1950&q=80" />

    <title>RentHub - Rental Properties</title>

    <!-- Structured data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "RentHub",
      "url": "https://www.example.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.example.com/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
